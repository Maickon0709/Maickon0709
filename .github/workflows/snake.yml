name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Maickon0709
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#a855f7&color_dots=#161b22,#312e81,#7c3aed,#a855f7,#c084fc

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
