name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Maickon0709
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#a855f7&color_dots=#0d1117,#2e1065,#6d28d9,#a855f7,#e9d5ff
      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
